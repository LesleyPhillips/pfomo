<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pfomo.com</title>
    <style>
        body { font-family: monospace; background-color: #000; color: #00ff00; padding: 10px; margin: 0; touch-action: manipulation; }
        #terminal { width: 100%; height: 90vh; overflow-y: auto; white-space: pre-wrap; -webkit-tap-highlight-color: transparent; word-wrap: break-word; }
        #terminal a { cursor: pointer; color: #00ff00; text-decoration: underline; pointer-events: auto; }
        #input-line { display: flex; }
        #input { background: transparent; color: #0f0; border: none; outline: none; font-family: monospace; width: 100%; }
        /* Hidden input field for mobile keyboard */
        #mobile-input { position: absolute; left: -9999px; opacity: 0; }
        /* blinking horizontal cursor used inside buffer */
        .cursor {
            display: inline-block;
            border-bottom: 2px solid #0f0;
            color: #0f0;
            background: transparent;
            line-height: 1;
            animation: blink 1s steps(1) infinite;
        }
        @keyframes blink { 50% { border-color: transparent; } }
    </style>
</head>
<body>

    <div id="terminal"></div>
    <input type="text" id="mobile-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

    <script>
        function version() {
            return "pfomo.com 20251205-1948";
        }

        const terminal = document.getElementById("terminal");
        const mobileInput = document.getElementById("mobile-input");
        let commandHistory = [];
        let historyIndex = -1;
        let userip = ""; // Global variable
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        //   ****   ****  ****   *****  *****  *   *
        //  *      *      *   *  *      *      **  *
        //   ***   *      ****   ***    ***    * * *
        //      *  *      *  *   *      *      *  **
        //  ****    ****  *   *  *****  *****  *   *

        // Screen buffer: 30 lines x 80 chars
        let screenBuffer = Array(30).fill("").map(() => " ".repeat(80));
        let cursorX = 0;
        let cursorY = 0;

        // Terminal API and command registry
        const Terminal = {
            screenBuffer,
            addInputLine: () => addInputLine(),
            clearScreen: () => clearScreen(),
            getCursor: () => ({ x: cursorX, y: cursorY }),
            getLineText: (y) => getLineText(y),
            print: (text) => printToTerminal(text),
            render: () => render(),
            scroll: () => scroll(),
            setCursor: (x,y) => { cursorX = x; cursorY = y; },
            setLineText: (y,text) => setLineText(y,text),
            writeAt: (x,y,ch) => writeAt(x,y,ch)
        };

        // Enable prompt inside the buffer and capture keyboard input globally
        let typingEnabled = false;

        function addInputLine() {
            // Put prompt char '>' at column 0 of current cursor line and position cursor at column 1
            if (cursorY < 0) cursorY = 0;
            if (cursorY > 29) cursorY = 29;
            writeAt(0, cursorY, '>');
            // clear rest of the line after prompt
            setLineText(cursorY, '');
            cursorX = 1;
            typingEnabled = true;
            render();
        }

        function clearScreen() {
            // Reset buffer and place the welcome message exactly at row 0
            screenBuffer = Array(30).fill("").map(() => " ".repeat(80));
            const msg = "Lesley is near....";
            // Write message into line 0 and pad to full width so coordinates are stable
            screenBuffer[0] = msg + " ".repeat(Math.max(0, 80 - msg.length));
            // Position cursor at column 0 of row 1 (handleKey will add spacing before prompt)
            cursorX = 0;
            cursorY = 1;
            render();
        }

        function getLineText(y) {
            return (screenBuffer[y] || '').slice(1).replace(/\s+$/,'');
        }

        function printToTerminal(text = "") {
            // Add text at current cursor position, wrapping and scrolling as needed
            for (let char of text) {
                if (char === '\n') {
                    cursorY++;
                    cursorX = 0;
                } else {
                    writeAt(cursorX, cursorY, char);
                    cursorX++;
                }
                // Auto-wrap and scroll
                if (cursorX >= 80) {
                    cursorX = 0;
                    cursorY++;
                }
                if (cursorY >= 30) {
                    scroll();
                }
            }
            render();
        }

        function scroll() {
            screenBuffer.shift(); // Remove top line
            screenBuffer.push(" ".repeat(80)); // Add blank line at bottom
            cursorY = 29;
        }

        function setLineText(y, text) {
            // write text starting at column 1, preserving column 0 for prompt
            const maxLen = Math.min(79, text.length);
            let line = screenBuffer[y].split('');
            for (let i = 0; i < 79; i++) {
                line[i + 1] = i < text.length ? text[i] : ' ';
            }
            screenBuffer[y] = line.join('');
        }

        function render() {
            // Convert buffer to HTML with proper spacing and draw a blinking horizontal cursor
            const lines = [];
            for (let y = 0; y < screenBuffer.length; y++) {
                const line = screenBuffer[y];
                if (y === cursorY) {
                    let chars = [];
                    for (let x = 0; x < line.length; x++) {
                        let ch = line[x];
                        // escape
                        if (ch === '<') ch = '&lt;';
                        if (ch === '>') ch = '&gt;';
                        if (x === cursorX) {
                            // Show the character at the cursor position with a blinking horizontal line (border-bottom)
                            // Keep the underlying character visible so typing replaces it naturally.
                            const displayChar = ch === ' ' ? '&nbsp;' : ch;
                            chars.push(`<span class="cursor">${displayChar}</span>`);
                        } else {
                            // Normal character
                            chars.push(ch === ' ' ? '&nbsp;' : ch);
                        }
                    }
                    lines.push(chars.join(''));
                } else {
                    // non-cursor lines: trim trailing spaces, then process URLs
                    let processedLine = line.trimEnd(); // Remove trailing spaces first!
                    // Make URLs clickable FIRST (before escaping, on raw line)
                    processedLine = processedLine.replace(
                        /(https?:\/\/[^\s<>]+)/g,
                        '<URL_MARKER>$1<\/URL_MARKER>'
                    );
                    // Now escape HTML (but protect our URL markers)
                    processedLine = processedLine.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    // Restore URL markers and wrap in clickable links
                    processedLine = processedLine.replace(
                        /&lt;URL_MARKER&gt;(https?:\/\/[^&\s<]+?)&lt;\/URL_MARKER&gt;/g,
                        '<a href="$1" target="_blank" style="color: #00ff00; text-decoration: underline;">$1</a>'
                    );
                    // Preserve spaces naturally via <pre>; no need to replace with &nbsp; to keep anchors valid
                    lines.push(processedLine);
                }
            }
            terminal.innerHTML = `<pre style="font-family:monospace; margin:0; padding:0; background-color: #000; color: #0f0; overflow-wrap: break-word; white-space: pre-wrap;">${lines.join('\n')}</pre>`;
                terminal.scrollTop = terminal.scrollHeight;
        }

        function writeAt(x, y, char) {
            if (y < 0 || y >= 30 || x < 0 || x >= 80) return;
            let line = screenBuffer[y].split('');
            line[x] = char;
            screenBuffer[y] = line.join('');
        }

        //   *   *  *****  *      ****   *****  ****    ****
        //   *   *  *      *      *   *  *      *   *  *    
        //   *****  ***    *      ****   ***    ****    *** 
        //   *   *  *      *      *      *      *  *       *
        //   *   *  *****  *****  *      *****  *   *  ****

        function executeCommand(command) {
            const cmdParts = command.trim().split(/\s+/);
            const kw = cmdParts[0].toLowerCase();
            const args = cmdParts.slice(1);

            const cmdFn = commandRegistry[kw];
            if (cmdFn) {
                try {
                    cmdFn(args, Terminal);
                } catch (err) {
                    printToTerminal(`Error running command '${kw}': ${err.message}`);
                }
                return;
            }

            printToTerminal("UNKNOWN COMMAND");
        }

        function handleKey(event) {
            if (!typingEnabled) return;

            // Ignore modifier-only events
            if (event.ctrlKey || event.metaKey) return;

            if (event.key === 'Enter') {
                event.preventDefault();
                // capture the command from the current input line
                const inputLineY = cursorY;
                const command = getLineText(inputLineY).trim();
                // disable typing while command runs
                typingEnabled = false;

                if (command) {
                    // save to history first
                    commandHistory.push(command);
                    historyIndex = commandHistory.length;

                    // set cursor to the line below the input so output prints there
                    cursorY = inputLineY + 1;
                    cursorX = 0;
                    if (cursorY >= 30) scroll();

                    executeCommand(command);

                    // after printing output, move to the next line for the prompt
                    cursorY = cursorY + 1;
                    cursorX = 0;
                    if (cursorY >= 30) scroll();
                } else {
                    // just move to next line (no output)
                    cursorY = inputLineY + 1;
                    cursorX = 0;
                    if (cursorY >= 30) scroll();
                }

                // Prepare next input line
                addInputLine();
                return;
            }

            if (event.key === 'Backspace') {
                event.preventDefault();
                if (cursorX > 1) {
                    cursorX--;
                    writeAt(cursorX, cursorY, ' ');
                    render();
                }
                return;
            }

            if (event.key === 'ArrowUp') {
                event.preventDefault();
                if (commandHistory.length === 0) return;
                if (historyIndex === -1) {
                    historyIndex = commandHistory.length - 1;
                } else if (historyIndex > 0) {
                    historyIndex--;
                }
                const entry = commandHistory[historyIndex] || '';
                setLineText(cursorY, entry);
                cursorX = 1 + entry.length;
                render();
                return;
            }

            if (event.key === 'ArrowDown') {
                event.preventDefault();
                if (commandHistory.length === 0) return;
                if (historyIndex === -1) return;
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    const entry = commandHistory[historyIndex] || '';
                    setLineText(cursorY, entry);
                    cursorX = 1 + entry.length;
                } else {
                    // past the end -> clear line
                    historyIndex = -1;
                    setLineText(cursorY, '');
                    cursorX = 1;
                }
                render();
                return;
            }

            // Printable characters
            if (event.key.length === 1) {
                event.preventDefault();
                writeAt(cursorX, cursorY, event.key);
                cursorX++;
                if (cursorX >= 80) {
                    cursorX = 0;
                    cursorY++;
                }
                if (cursorY >= 30) scroll();
                render();
            }
        }

        // Attach global key handler
        window.addEventListener('keydown', handleKey);

        // Mobile support: focus hidden input on terminal tap/click
        terminal.addEventListener('click', () => {
            if (isMobile && typingEnabled) {
                mobileInput.focus();
            }
        });

        terminal.addEventListener('touchstart', (e) => {
            if (typingEnabled) {
                mobileInput.focus();
            }
        }, { passive: true });

        // Handle mobile input field (only on mobile devices)
        if (isMobile) {
            mobileInput.addEventListener('input', (e) => {
                if (!typingEnabled) return;
                const char = e.data;
                if (char && char.length === 1) {
                    writeAt(cursorX, cursorY, char);
                    cursorX++;
                    if (cursorX >= 80) {
                        cursorX = 0;
                        cursorY++;
                    }
                    if (cursorY >= 30) scroll();
                    render();
                }
                mobileInput.value = ''; // Clear after processing
            });

            // Handle mobile Enter key
            mobileInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleKey({ key: 'Enter', preventDefault: () => {} });
                    mobileInput.blur();
                    setTimeout(() => { if (typingEnabled) mobileInput.focus(); }, 100);
                } else if (e.key === 'Backspace') {
                    e.preventDefault();
                    handleKey({ key: 'Backspace', preventDefault: () => {} });
                }
            });
        }

        async function getUserIP() {
            try {
                const response = await fetch("https://api64.ipify.org?format=json");
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return "Unknown";
            }
        }

        //
        // Commands and help
        //   

        // Command registry
        const commandRegistry = {};

        // Help text for commands
        const helpMap = {
            cls: { desc: 'Clear the screen and show welcome message', usage: 'cls' },
            drawcorners: { desc: 'Draw solid blocks in the four corners of the screen', usage: 'drawcorners' },
            drawrandomblocks: { desc: 'Draw N random block characters on the screen (default 100)', usage: 'drawrandomblocks [N]' },
            dir: { desc: 'Show a mock directory listing', usage: 'dir' },
            echo: { desc: 'Echo the arguments back', usage: 'echo <text>' },
            help: { desc: 'Show available commands. Use "help more" for details or "help [command]" for specific usage', usage: 'help [command|more]' },
            version: { desc: 'Show version string', usage: 'version' },
            whoami: { desc: 'Show browser / platform / IP info', usage: 'whoami' },
            whoislesley: { desc: 'Show Lesley contact links', usage: 'whoislesley' }
        };

        function registerCommand(name, fn, help) {
            commandRegistry[name.toLowerCase()] = fn;
            if (help) helpMap[name.toLowerCase()] = { desc: help, usage: name };
        }

        // Register built-in commands using the registry
        registerCommand('cls', () => { cmdCls(); });
        registerCommand('drawcorners', () => { cmdDrawCorners(); }, 'Draw blocks in the four corners');
        registerCommand('drawrandomblocks', (args) => { cmdDrawRandomBlocks(args); }, 'Draw N random blocks');
        registerCommand('dir', () => { cmdDir(); }, 'Show mock directory');
        registerCommand('echo', (args) => { cmdEcho(args); }, 'Echo text');
        registerCommand('help', (args) => { cmdHelp(args); });
        registerCommand('version', () => { cmdVersion(); }, 'Show version');
        registerCommand('whoami', () => { cmdWhoami(); }, 'Show client info');
        registerCommand('whoislesley', () => { cmdWhoislesley(); }, 'Show Lesley links');

        //
        // Command implementations
        //

        function cmdCls() {
            Terminal.clearScreen();
        }

        function cmdDir() {
            printToTerminal("[mock directory output]\nfile1.txt\nfile2.exe\nfolder1\n");
        }

        function cmdEcho(args) {
            printToTerminal(args.join(' ') || 'Say what?');
        }

        function cmdHelp(args) {
            if (args.length > 0) {
                const target = args[0].toLowerCase();
                if (target === 'more') {
                    // help more - show detailed list with descriptions
                    printToTerminal('Available commands:\n');
                    const keys = Object.keys(helpMap).sort();
                    for (const k of keys) {
                        printToTerminal(`${k}: ${helpMap[k].desc}\n`);
                    }
                } else if (helpMap[target]) {
                    // help [command] - show specific command with usage
                    printToTerminal(`${target}: ${helpMap[target].desc} ${helpMap[target].usage}`);
                } else {
                    printToTerminal(`No help available for '${target}'.`);
                }
            } else {
                // help - show comma-separated list
                const keys = Object.keys(helpMap).sort();
                printToTerminal(keys.join(', '));
                printToTerminal('\nAdditional help: help more');
            }
        }

        function cmdVersion() {
            printToTerminal(version());
        }

        function cmdWhoami() {
            const info = {
                browser: navigator.userAgent,
                language: navigator.language || navigator.userLanguage,
                platform: navigator.platform,
                screenResolution: `${window.screen.width}x${window.screen.height}`,
                timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                ip: userip || "Unknown",
            };
            printToTerminal(JSON.stringify(info, null, ' '));
        }

        function cmdWhoislesley() {
            printToTerminal('Blog: https://lesley-o0.blogspot.com\n');
            printToTerminal('LinkedIn: https://www.linkedin.com/in/lesley-phillips-ii');
        }

        // Draw solid blocks in corners: (0,0), (79,0), (0,29), (79,29)
        function cmdDrawCorners() {
            writeAt(0, 0, '█');
            writeAt(79, 0, '█');
            writeAt(0, 29, '█');
            writeAt(79, 29, '█');
            render();
        }

        // a function to draw a number 100 random blocks within the screen
        function cmdDrawRandomBlocks(args) {
            const n = args[0] ? parseInt(args[0],10) : NaN;
            const maxDots = Number.isFinite(n) && n>0 ? n : 100;
            for (let i = 0; i < maxDots; i++) {
                const x = Math.floor(Math.random() * 80);
                const y = Math.floor(Math.random() * 30);
                writeAt(x, y, '█');
            }
            render();
        }



        // Setup
        async function initializeGlobalVars() {
            userip = await getUserIP();
        }

        (async () => {
            await initializeGlobalVars();
            clearScreen();
            cursorY++; // Add blank line spacing after welcome message
            addInputLine();
        })();
    </script>

</body>
</html>
